{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg" style="border-radius: 20px;">
                <div class="card-header bg-success py-3 text-center" style="border-radius: 20px 20px 0 0;">
                    <h4 class="text-white mb-0"><i class="fas fa-hand-holding-usd me-2"></i>Registrar Ingreso Extra</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">Concepto del Ingreso</label>
                            <input type="text" name="concepto" class="form-control form-control-lg" 
                                   placeholder="Ej: Alquiler de Local / Cancha" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">Monto ($)</label>
                            <input type="number" step="0.01" name="monto" class="form-control form-control-lg" 
                                   placeholder="0.00" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">Fecha del Evento</label>
                            <input type="date" name="fecha" class="form-control form-control-lg" 
                                   value="{{ current_date }}" required>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-success btn-lg shadow-sm" style="border-radius: 12px;">
                                <i class="fas fa-save me-2"></i>Guardar Ingreso
                            </button>
                            <a href="{{ url_for('inicio') }}" class="btn btn-link text-muted">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
