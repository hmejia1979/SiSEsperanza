{% extends "base.html" %}
{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <h2 style="color: #1e293b; margin-top: 0; margin-bottom: 20px;">🏠 Editar Casa {{ casa.numero_casa }}</h2>
        
        <form method="POST">
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: 600; margin-bottom: 5px; color: #475569;">Número de Casa:</label>
                <input type="text" name="numero_casa" value="{{ casa.numero_casa }}" required
                       style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1;">
            </div>

            <div style="margin-bottom: 25px;">
                <label style="display: block; font-weight: 600; margin-bottom: 5px; color: #475569;">Nombre del Dueño:</label>
                <input type="text" name="dueno_nombre" value="{{ casa.dueno_nombre }}" required
                       style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1;">
            </div>

            <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 25px 0;">

            <div style="margin-bottom: 25px; background: #fff7ed; padding: 15px; border-radius: 10px; border: 1px solid #fdba74;">
                <label style="display: block; font-weight: 700; margin-bottom: 5px; color: #9a3412;">💰 Deuda Anterior (2025):</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 12px; top: 10px; color: #9a3412; font-weight: bold;">$</span>
                    <input type="number" step="0.01" name="deuda_anterior" value="{{ casa.deuda_anterior }}"
                           style="width: 100%; padding: 10px 10px 10px 30px; border-radius: 8px; border: 1px solid #fdba74; background: white; font-size: 1.1rem; font-weight: bold; color: #c2410c;">
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" style="flex: 2; background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer;">
                    Guardar Cambios
                </button>
                <a href="{{ url_for('lista_casas') }}" style="flex: 1; text-align: center; background: #94a3b8; color: white; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: 700;">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
