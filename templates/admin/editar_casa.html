{% extends "base.html" %}
{% block content %}
<div style="max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="color: #1e293b; margin-bottom: 25px;">✏️ Editar Casa {{ casa.numero_casa }}</h2>
    
    <form method="POST">
        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Número de Casa:</label>
        <input type="text" name="numero_casa" value="{{ casa.numero_casa }}" required style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 8px;">

        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Nombre del Propietario (Real):</label>
        <input type="text" name="dueno_nombre" value="{{ casa.dueno_nombre }}" required style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 8px;">

        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Deuda Actual ($):</label>
        <input type="number" step="0.01" name="saldo_total" value="{{ casa.saldo_total }}" required style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 8px;">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #3b82f6;">Asignar Cuenta de Acceso (Usuario):</label>
        <select name="usuario_id" style="width: 100%; padding: 10px; margin-bottom: 30px; border: 1px solid #3b82f6; border-radius: 8px; background: #eff6ff;">
            <option value="">-- Sin cuenta de usuario --</option>
            {% for u in usuarios %}
                <option value="{{ u.id }}" {% if casa.usuario_id == u.id %}selected{% endif %}>
                    {{ u.username }} (ID: {{ u.id }})
                </option>
            {% endfor %}
        </select>

        <div style="display: flex; gap: 10px;">
            <button type="submit" style="flex: 1; background: #10b981; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer;">
                Guardar Cambios
            </button>
            <a href="{{ url_for('lista_casas') }}" style="flex: 1; text-align: center; background: #64748b; color: white; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: 700;">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
