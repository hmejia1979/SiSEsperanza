{% extends "base.html" %}
{% block content %}
<div style="max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
    <h2 style="color: #1e293b; margin-bottom: 20px;">⚙️ Configuración del Sistema</h2>
    <hr style="border: 0; border-top: 1px solid #e2e8f0; margin-bottom: 25px;">

    <form method="POST">
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; color: #475569; margin-bottom: 10px;">
                Valor de la Alícuota Mensual ($)
            </label>
            <input type="number" step="0.01" name="valor_alicuota" value="{{ alicuota }}" 
                   style="width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #cbd5e1; font-size: 1.1rem;">
            <p style="color: #64748b; font-size: 0.85rem; margin-top: 8px;">
                * Este valor se aplicará automáticamente la próxima vez que presiones el botón "Cargar Alícuotas".
            </p>
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; color: #475569; margin-bottom: 10px;">
                Número de WhatsApp de Soporte
            </label>
            <input type="number" name="whatsapp_admin" value="{{ whatsapp }}" 
                placeholder="Ej: 593987654321"
                style="width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #cbd5e1; font-size: 1.1rem;">
            <p style="color: #64748b; font-size: 0.85rem; margin-top: 8px;">
                * Incluye el código de país (Ej: 593 para Ecuador) sin el signo +.
            </p>
        </div>
        <button type="submit" style="width: 100%; background: #1e293b; color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;">
            💾 Guardar Cambios
        </button>
    </form>
</div>
{% endblock %}
