{% extends "base.html" %}
{% block content %}
<div style="max-width: 500px; margin: 50px auto; padding: 0 20px;">
    <div style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="background: #eff6ff; color: #3b82f6; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 1.5rem;">
                👤
            </div>
            <h2 style="color: #1e293b; margin: 0; font-size: 1.5rem; font-weight: 800;">Editar Propietario</h2>
            <p style="color: #64748b; font-size: 0.9rem; margin-top: 5px;">Actualice las credenciales de acceso</p>
        </div>

        <form method="POST">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #475569; font-weight: 600;">Nombre de Usuario:</label>
                <input type="text" name="username" value="{{ usuario.username }}" required 
                       style="width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; outline: none;">
            </div>
            <div style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 8px; color: #475569; font-weight: 600;">Asignar a Propiedad:</label>
                <select name="casa_id" style="width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; background: #f8fafc; outline: none; cursor: pointer;">
                    <option value="">-- Sin casa asignada --</option>
                    {% for c in casas %}
                        <option value="{{ c.id }}" {% if c.usuario_id == usuario.id %}selected{% endif %}>
                            🏠 Casa {{ c.numero_casa }} - {{ c.dueno_nombre }}
                        </option>
                    {% endfor %}
                </select>
                <small style="color: #94a3b8; display: block; margin-top: 5px;">Esto cambiará a qué casa tiene acceso este usuario.</small>
            </div>
            <div style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 8px; color: #475569; font-weight: 600;">Nueva Contraseña:</label>
                <input type="password" name="password" placeholder="Dejar en blanco para no cambiar" 
                       style="width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; outline: none;">
                <small style="color: #94a3b8; display: block; margin-top: 5px;">Solo llene este campo si desea resetear la clave.</small>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #475569; font-weight: 600;">Cédula de Identidad:</label>
                <input type="text" name="cedula" value="{{ usuario.cedula or '' }}" placeholder="Ej: 1712345678" 
                    style="width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; outline: none;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #475569; font-weight: 600;">Teléfono / WhatsApp:</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%);">📞</span>
                    <input type="text" name="telefono" value="{{ usuario.telefono or '' }}" placeholder="Ej: 0991234567" 
                        style="width: 100%; padding: 12px 12px 12px 40px; border: 2px solid #f1f5f9; border-radius: 12px; outline: none;">
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="submit" style="flex: 2; background: #3b82f6; color: white; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer;">
                    Guardar Cambios
                </button>
                <a href="{{ url_for('lista_propietarios') }}" style="flex: 1; text-align: center; background: #f1f5f9; color: #64748b; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 600;">
                    Volver
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
