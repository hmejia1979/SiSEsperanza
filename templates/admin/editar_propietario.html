{% extends "base.html" %}
{% block content %}
<div class="admin-container" style="max-width: 600px; margin: 40px auto;">
    <div class="form-card" style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <h2 style="color: #2c3e50; text-align: center;">✏️ Editar Propietario</h2>
        <form method="POST">
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold; color: #4a5568;">Nombre de Usuario:</label>
                <input type="text" name="nombre" value="{{ usuario.username }}" required style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold; color: #4a5568;">Casa Asignada:</label>
                <select name="casa_id" required style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;">
                    {% for casa in casas %}
                    <option value="{{ casa.id }}" {% if casa.id == usuario.casa_id %}selected{% endif %}>
                        ID: {{ casa.id }} - {{ casa.numero or 'Casa' }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: bold; color: #4a5568;">Nueva Contraseña (dejar en blanco para no cambiar):</label>
                <input type="password" name="password" placeholder="********" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;">
            </div>
            <button type="submit" style="width: 100%; background: #3182ce; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer;">Guardar Cambios</button>
            <a href="{{ url_for('lista_propietarios') }}" style="display: block; text-align: center; margin-top: 15px; color: #718096; text-decoration: none;">Volver atrás</a>
        </form>
    </div>
</div>
{% endblock %}
