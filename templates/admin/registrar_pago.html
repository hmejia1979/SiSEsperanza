<style>
    /* Estilo de emergencia para probar */
    .admin-container { background-color: #f0f2f5; padding: 50px; display: flex; flex-direction: column; align-items: center; }
    .form-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 400px; border-top: 5px solid #28a745; }
    .btn-save { background: #28a745; color: white; padding: 10px; width: 100%; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .btn-save:hover { background: #218838; }
</style>
{% extends "base.html" %}

{% block content %}
<div class="admin-container" style="padding: 40px 0;">
    <div style="display: flex; gap: 30px; align-items: flex-start;">
        
        <div class="form-card" style="flex: 1; max-width: 380px; border-top: 5px solid #10b981;">
            <h2 style="color: #1e293b; margin: 0 0 20px;">💰 Nuevo Pago</h2>
            <form method="POST">
                <label>Seleccionar Casa</label>
                <select name="casa_id" required style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #cbd5e0;">
                    <option value="" disabled selected>Elegir propiedad...</option>
                    {% for casa in casas %}
                    <option value="{{ casa.id }}">Casa {{ casa.numero_casa }} (Debe: ${{ "{:,.2f}".format(casa.deuda_2025) }})</option>
                    {% endfor %}
                </select>

                <label>Monto a Recibir ($)</label>
                <input type="number" step="0.01" name="monto" placeholder="0.00" required
                       style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #cbd5e0;">

                <label>Concepto / Referencia</label>
                <input type="text" name="concepto" placeholder="Ej: Pago Enero - Efectivo" required
                       style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #cbd5e0;">

                <button type="submit" style="background: #10b981; color: white; width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s;">
                    Registrar Cobro
                </button>
            </form>
        </div>

        <div class="table-card" style="flex: 2;">
            <h2 style="margin: 0 0 20px; color: #1e293b;">Últimos 10 Ingresos</h2>
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background: #f8fafc; text-align: left;">
                        <th style="padding: 12px; border-bottom: 1px solid #e2e8f0; color: #64748b; font-size: 0.8rem;">CASA</th>
                        <th style="padding: 12px; border-bottom: 1px solid #e2e8f0; color: #64748b; font-size: 0.8rem;">CONCEPTO</th>
                        <th style="padding: 12px; border-bottom: 1px solid #e2e8f0; color: #64748b; font-size: 0.8rem; text-align: right;">VALOR</th>
                    </tr>
                </thead>
                <tbody>
                    {% for pago in pagos_recientes %}
                    <tr style="border-bottom: 1px solid #f1f5f9;">
                        <td style="padding: 12px; font-weight: 700; color: #3b82f6;">{{ pago.casa.numero_casa }}</td>
                        <td style="padding: 12px; color: #475569;">{{ pago.concepto }}</td>
                        <td style="padding: 12px; text-align: right; font-weight: 800; color: #10b981;">+ ${{ "{:,.2f}".format(pago.monto) }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

    </div>
</div>
{% endblock %}
