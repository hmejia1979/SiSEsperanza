{% extends "base.html" %}
{% block content %}
<h2>Registrar Nueva Casa y Dueño</h2>
<form method="POST" style="display: flex; flex-direction: column; max-width: 400px; gap: 10px;">
    <h3>Datos de la Vivienda</h3>
    <input type="text" name="numero_casa" placeholder="Número de Casa (Ej: A-12)" required>
    <input type="text" name="nombre" placeholder="Nombre completo del dueño" required>
    <input type="number" step="0.01" name="deuda_2025" placeholder="Deuda pendiente año anterior ($)">
    
    <h3>Acceso al Sistema</h3>
    <input type="text" name="username" placeholder="Nombre de usuario (Login)" required>
    <input type="password" name="password" placeholder="Contraseña inicial" required>
    
    <button type="submit" style="background-color: green; color: white; padding: 10px;">Guardar Todo</button>
</form>
{% endblock %}
