{% extends "base.html" %}
{% block content %}
<div style="max-width: 500px; margin: 50px auto; padding: 0 20px;">
    
    <div style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="background: #eff6ff; color: #3b82f6; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 1.5rem; font-weight: 800;">
                👤
            </div>
            <h2 style="color: #1e293b; margin: 0; font-size: 1.5rem; font-weight: 800;">Nuevo Propietario</h2>
            <p style="color: #64748b; font-size: 0.9rem; margin-top: 5px;">Cree una cuenta de acceso al sistema SiSEsperanza</p>
        </div>

        <form method="POST">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #475569; font-weight: 600;">Nombre de Usuario:</label>
                <input type="text" name="username" required placeholder="Ej: familia_mejia" 
                       style="width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; outline: none;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #475569; font-weight: 600;">Contraseña Temporal:</label>
                <input type="password" name="password" required placeholder="••••••••" 
                       style="width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; outline: none;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #475569; font-weight: 600;">Cédula:</label>
                <input type="text" name="cedula" placeholder="1712345678" 
                       style="width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; outline: none;">
            </div>

            <div style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 8px; color: #475569; font-weight: 600;">Teléfono:</label>
                <input type="text" name="telefono" placeholder="0991234567" 
                       style="width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; outline: none;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #475569; font-weight: 600;">Correo Electrónico:</label>
                <input type="email" name="correo" required placeholder="ejemplo@correo.com" 
                    style="width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; outline: none; box-sizing: border-box;">
                <small style="color: #94a3b8; font-size: 0.8rem;">Vital para enviar los avisos de cobro.</small>
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="submit" style="flex: 2; background: #3b82f6; color: white; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer;">
                    Crear Cuenta
                </button>
                <a href="{{ url_for('lista_propietarios') }}" style="flex: 1; text-align: center; background: #f1f5f9; color: #64748b; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 600;">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
