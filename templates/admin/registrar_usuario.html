{% extends "base.html" %}

{% block content %}
<div class="admin-container" style="max-width: 600px; margin: 0 auto;">
    <div class="form-card" style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <h2 style="color: #2c3e50; margin-bottom: 25px; text-align: center;">Registrar Nuevo Propietario</h2>
        
        <form method="POST">
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">Nombre de Usuario:</label>
                <input type="text" name="nombre" placeholder="Ej: juan_perez" required 
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-weight: bold;">Contraseña:</label>
                <input type="password" name="password" placeholder="Contraseña" required 
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">Seleccionar Casa Registrada:</label>
                <select name="casa_id" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; background-color: white;">
                    <option value="" disabled selected>-- Elija una casa --</option>
                    {% for casa in casas %}
                        <option value="{{ casa.id }}">ID: {{ casa.id }} - {{ casa.numero or 'Casa' }}</option>
                    {% endfor %}
                </select>
                <small style="color: #7f8c8d;">Solo aparecen las casas creadas en la base de datos.</small>
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn-pago" style="flex: 2; background-color: #2ecc71; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                    Guardar Propietario
                </button>
                <a href="{{ url_for('lista_propietarios') }}" style="flex: 1; text-align: center; background-color: #95a5a6; color: white; text-decoration: none; padding: 12px; border-radius: 6px; font-weight: bold;">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
