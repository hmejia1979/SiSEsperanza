{% extends "base.html" %}

{% block content %}
<div class="admin-container" style="max-width: 600px; margin: 40px auto; padding: 20px;">
    <div style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
        <h2 style="color: #1e293b; margin-bottom: 20px; text-align: center;">Registrar Nueva Propiedad</h2>
        
        <form method="POST">
            <div style="margin-bottom: 15px;">
                <label style="display: block; color: #64748b; margin-bottom: 5px;">Número de Casa o Lote:</label>
                <input type="text" name="numero_casa" required 
                       style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display: block; color: #64748b; margin-bottom: 5px;">Nombre del Propietario:</label>
                <input type="text" name="propietario" required 
                       style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; color: #64748b; margin-bottom: 5px;">Deuda Inicial ($):</label>
                <input type="number" step="0.01" name="deuda_inicial" value="0.00" 
                       style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px;">
                <small style="color: #94a3b8;">Si la casa ya debe meses anteriores, regístralo aquí.</small>
            </div>
            <label>Vincular con Cuenta de Usuario:</label>
            <select name="usuario_id" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px;">
                <option value="">-- Sin cuenta vinculada --</option>
                {% for u in usuarios %}
                    <option value="{{ u.id }}">{{ u.username }}</option>
                {% endfor %}
            </select>
            <button type="submit" 
                    style="width: 100%; background: #3b82f6; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer;">
                Guardar Propiedad
            </button>
        </form>
        
        <div style="margin-top: 15px; text-align: center;">
            <a href="{{ url_for('lista_casas') }}" style="color: #64748b; text-decoration: none; font-size: 0.9rem;">Volver a la lista</a>
        </div>
    </div>
</div>
{% endblock %}
