{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <a href="{{ url_for('lista_casas') }}" class="btn btn-link text-decoration-none text-secondary mb-3 p-0">
                <i class="bi bi-arrow-left"></i> Volver al listado
            </a>

            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 70px; height: 70px;">
                            <i class="bi bi-house-add fs-1"></i>
                        </div>
                        <h3 class="fw-bold">Nueva Propiedad</h3>
                        <p class="text-muted">Complete los datos del nuevo socio</p>
                    </div>

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Número de Casa / Villa</label>
                            <input type="text" name="numero_casa" class="form-control form-control-lg bg-light border-0" placeholder="Ej: Manzana 5 - Villa 2" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre del Propietario</label>
                            <input type="text" name="propietario" class="form-control form-control-lg bg-light border-0" placeholder="Nombre completo" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Saldo Inicial (Deuda anterior)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0">$</span>
                                <input type="number" step="0.01" name="deuda_inicial" class="form-control form-control-lg bg-light border-0" value="0.00">
                            </div>
                            <div class="form-text text-info"><i class="bi bi-info-circle"></i> Use esto si el vecino ya debe dinero antes de entrar al sistema.</div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-3 shadow-sm">
                                <i class="bi bi-save me-2"></i>Guardar Propiedad
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
