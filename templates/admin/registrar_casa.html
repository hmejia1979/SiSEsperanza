{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="background: #e0f2fe; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
                <span style="font-size: 1.5rem;">🏠</span>
            </div>
            <h2 style="color: #1e293b; margin: 0;">Registrar Nueva Casa</h2>
            <p style="color: #64748b; margin-top: 5px;">Ingrese la información del propietario y saldos iniciales.</p>
        </div>

        <form action="{{ url_for('registrar_casa') }}" method="POST">
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #475569; font-weight: 600;">Número de Casa:</label>
                <input type="text" name="numero_casa" required placeholder="Ej: A-12 o 105" 
                       style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; transition: border-color 0.2s;"
                       onfocus="this.style.borderColor='#3b82f6'; this.style.outline='none';"
                       onblur="this.style.borderColor='#e2e8f0';">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #475569; font-weight: 600;">Nombre Completo del Dueño:</label>
                <input type="text" name="dueno_nombre" required placeholder="Nombre y Apellido" 
                       style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; transition: border-color 0.2s;"
                       onfocus="this.style.borderColor='#3b82f6'; this.style.outline='none';"
                       onblur="this.style.borderColor='#e2e8f0';">
            </div>

            <div style="background: #fff7ed; padding: 20px; border-radius: 15px; border: 1px solid #fdba74; margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 5px; color: #9a3412; font-weight: 700;">
                    💰 Deuda Acumulada (Año 2025 o anterior)
                </label>
                <p style="font-size: 0.85rem; color: #c2410c; margin-bottom: 12px;">
                    Si el vecino arrastra una deuda del año pasado, ingrésela aquí. Este valor se sumará al saldo total.
                </p>
                <div style="position: relative;">
                    <span style="position: absolute; left: 15px; top: 12px; color: #9a3412; font-weight: bold;">$</span>
                    <input type="number" step="0.01" name="deuda_anterior" placeholder="0.00" 
                           style="width: 100%; padding: 12px 12px 12px 35px; border: 2px solid #fdba74; border-radius: 10px; font-size: 1rem; background: white;">
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <a href="{{ url_for('inicio') }}" 
                   style="flex: 1; text-align: center; padding: 14px; background: #f1f5f9; color: #475569; text-decoration: none; border-radius: 10px; font-weight: 600; transition: 0.2s;"
                   onmouseover="this.style.background='#e2e8f0'"
                   onmouseout="this.style.background='#f1f5f9'">
                    Cancelar
                </a>
                <button type="submit" 
                        style="flex: 2; padding: 14px; background: #1e293b; color: white; border: none; border-radius: 10px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"
                        onmouseover="this.style.background='#334155'"
                        onmouseout="this.style.background='#1e293b'">
                    Guardar Casa
                </button>
            </div>

        </form>
    </div>
</div>

<style>
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
    input[type=number] {
        -moz-appearance: textfield;
    }
</style>
{% endblock %}
