{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0" style="border-radius: 15px;">
            <div class="card-header bg-primary text-white py-3" style="border-radius: 15px 15px 0 0;">
                <h5 class="mb-0">💰 Registrar Ingreso Comunal</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Categoría</label>
                        <select name="categoria" class="form-select" required>
                            <option value="Alquiler Local">🏢 Alquiler de Local</option>
                            <option value="Alquiler Cancha">⚽ Alquiler de Cancha</option>
                            <option value="Multa">⚠️ Multa Administrativa</option>
                            <option value="Donación">🎁 Donación</option>
                            <option value="Otro">➕ Otro</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Detalle del concepto</label>
                        <input type="text" name="concepto" class="form-control" placeholder="Ej: Alquiler para evento Villa 5" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label fw-bold">Monto ($)</label>
                            <input type="number" step="0.01" name="monto" class="form-control" required>
                        </div>
                        <div class="col">
                            <label class="form-label fw-bold">Fecha</label>
                            <input type="date" name="fecha" class="form-control" value="{{ hoy }}" required>
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Guardar Ingreso</button>
                        <a href="{{ url_for('lista_otros_ingresos') }}" class="btn btn-light">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
