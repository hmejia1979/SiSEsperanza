{% extends "base.html" %}
{% block content %}
<div style="max-width: 450px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="color: #1e293b; margin-bottom: 20px; text-align: center;">🔐 Cambiar Contraseña</h2>
    <p style="color: #64748b; font-size: 0.9rem; text-align: center; margin-bottom: 25px;">
        Por seguridad, introduce tu clave actual y la nueva.
    </p>

    <form method="POST">
        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Contraseña Actual:</label>
        <input type="password" name="password_actual" required 
               style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 8px;">

        <hr style="border: 0; border-top: 1px solid #f1f5f9; margin-bottom: 20px;">

        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Nueva Contraseña:</label>
        <input type="password" name="nueva_password" required 
               style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 8px;">

        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Confirmar Nueva Contraseña:</label>
        <input type="password" name="confirmar_password" required 
               style="width: 100%; padding: 12px; margin-bottom: 30px; border: 1px solid #e2e8f0; border-radius: 8px;">

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button type="submit" style="background: #1e293b; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer;">
                Actualizar Contraseña
            </button>
            <a href="{{ url_for('inicio') }}" style="text-align: center; color: #64748b; text-decoration: none; font-size: 0.9rem;">
                Cancelar y volver
            </a>
        </div>
    </form>
</div>
{% endblock %}
